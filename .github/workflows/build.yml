name: Python EXE Build

on:
  push:
    branches: [ "main" ] # Hangi branch'e push yapınca çalışsın?
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest # Kritik nokta: Windows üzerinde derleme yapıyoruz

    steps:
    - name: Depoyu Klonla
      uses: actions/checkout@v4

    - name: Python Kur
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # Kullandığın sürümü buraya yazabilirsin

    - name: Bağımlılıkları Yükle
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        if (Test-Path requirements.txt) { pip install -r requirements.txt }

    - name: EXE Oluştur
      run: |
        # 'ana_dosyan.py' kısmını kendi ana dosya adınla değiştir
        pyinstaller --onefile --windowed main.py

    - name: EXE Dosyasını Kaydet (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: Windows-Executable
        path: dist/*.exe
