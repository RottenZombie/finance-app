name: Windows EXE Build

on:
  push:
    branches: [ "main" ] # Burası 'main' mi 'master' mı kontrol et, gerekirse değiştir.

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Kodları Klonla
      uses: actions/checkout@v4

    - name: Python Kur
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Bağımlılıkları Yükle
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        if (Test-Path requirements.txt) { pip install -r requirements.txt }

    - name: EXE Oluştur
      run: |
        # --paths . sayesinde core, features, ui klasörlerini otomatik görür
        # --add-data "config.json;." eğer config.json EXE'nin yanında lazımsa ekledim
        pyinstaller --onefile --windowed --paths . --add-data "config.json;." app.py

    - name: EXE'yi Kaydet
      uses: actions/upload-artifact@v4
      with:
        name: FinanceApp-Windows
        path: dist/*.exe
